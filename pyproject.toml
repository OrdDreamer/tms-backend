[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tms_backend.settings.test"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--strict-markers", "--tb=short", "-ra"]
markers = ["slow: marks tests as slow"]

[tool.coverage.run]
source = ["apps"]
omit = ["*/migrations/*", "*/management/*", "*/admin.py", "*/__init__.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.ruff]
line-length = 79
target-version = "py312"
exclude = ["**/migrations", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "W", "F", "B", "C4", "N", "Q", "UP", "I", "DJ", "S", "PT", "RUF"]
ignore = ["E203", "E266"]
mccabe.max-complexity = 18

[tool.ruff.lint.isort]
known-first-party = ["apps", "tms_backend"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "S105", "S106"]
"apps/factories/**/*.py" = ["S105", "S106"]
"**/models.py" = ["RUF012"]
"**/admin.py" = ["RUF012"]

[tool.ruff.format]
quote-style = "double"
